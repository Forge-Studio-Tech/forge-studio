    <!-- JSON-LD: FAQPage (AEO — respostas diretas pra motores de IA e featured snippets) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "Quanto tempo leva para o meu site ficar pronto?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Landing Pages ficam prontas em até 5 dias úteis após o alinhamento inicial. Sites Institucionais levam até 10 dias úteis, dependendo da complexidade."
          }
        },
        {
          "@type": "Question",
          "name": "Preciso ter domínio e hospedagem antes de contratar?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Não. A gente cuida de tudo. O primeiro ano de domínio .com.br está incluso na criação. A hospedagem pode ser incluída no plano mensal ou gerenciada separadamente."
          }
        },
        {
          "@type": "Question",
          "name": "Posso pedir alterações depois que o site ficar pronto?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Sim! Temos planos de manutenção mensal com pacotes de alterações. Mudanças de texto, imagem, telefone, novas seções — tudo com prazo garantido."
          }
        },
        {
          "@type": "Question",
          "name": "Vocês fazem sites para qualquer segmento?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Sim. Já entregamos para turismo, fitness e outros segmentos. Se o seu negócio precisa de presença digital, a gente tem a solução certa."
          }
        },
        {
          "@type": "Question",
          "name": "Como funciona o pagamento?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "50% no início do projeto e 50% na entrega. Tudo via Pix, sem burocracia."
          }
        },
        {
          "@type": "Question",
          "name": "O site funciona bem no celular?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Sempre. Todos os projetos são desenvolvidos com foco em celular e testados em diferentes tamanhos de tela antes da entrega."
          }
        }
      ]
    }
    </script>
